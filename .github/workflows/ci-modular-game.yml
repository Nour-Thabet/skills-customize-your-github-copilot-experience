name: CI - Modular Game

on:
  push:
    paths:
      - 'assignments/games-in-python/modular-game/**'
  pull_request:
    paths:
      - 'assignments/games-in-python/modular-game/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r assignments/games-in-python/modular-game/requirements.txt
      - name: Run tests
        run: |
          pytest -q assignments/games-in-python/modular-game/tests
